<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at top, #1a0000, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: #fff;
        }

        .login-box {
            width: 360px;
            padding: 35px;
            background: #0b0b0b;
            border: 1px solid #ff1a1a;
            border-radius: 10px;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.35);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #ff1a1a;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #111;
            border: 1px solid #333;
            border-radius: 5px;
            color: #fff;
            font-size: 14px;
        }

        .login-box input:focus {
            outline: none;
            border-color: #ff1a1a;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.6);
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #ff0000, #990000);
            border: none;
            border-radius: 5px;
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-box button:hover {
            background: linear-gradient(90deg, #ff3333, #cc0000);
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.7);
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Name" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clients Réseau</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at top, #1a0000, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: #fff;
        }

        .box {
            width: 450px;
            padding: 35px;
            background: #0b0b0b;
            border: 1px solid #ff1a1a;
            border-radius: 10px;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.35);
        }

        .box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #ff1a1a;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .client {
            padding: 12px;
            margin-bottom: 12px;
            background: #111;
            border: 1px solid #333;
            border-radius: 5px;
            transition: 0.3s;
        }

        .client a {
            text-decoration: none;
            color: #fff;
            display: block;
        }

        .client:hover {
            border-color: #ff1a1a;
            background: #160000;
            box-shadow: 0 0 10px rgba(255,0,0,0.6);
        }

        .hostname {
            font-weight: bold;
            letter-spacing: 1px;
        }

        .ip {
            font-size: 13px;
            color: #ccc;
        }

        .alert {
            border-color: #ff1a1a;
            box-shadow: 0 0 12px rgba(255,0,0,0.8);
        }

        .empty {
            text-align: center;
            color: #888;
            font-style: italic;
        }
	    .back-btn {
            margin-top: 25px;
            display: block;
            text-align: center;
        }

        .back-btn button {
            background: black;
            color: white;
            border: 2px solid red;
            padding: 10px 20px;
        }

        .back-btn button:hover {
            background: red;
            color: black;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Clients Réseau</h2>

    {% if clients %}
        {% for client in clients %}
            <div class="client {% if client.alert %}alert{% endif %}">
                <a href="{{ url_for('client_detail', ip=client.ip) }}">
                    <div class="hostname">{{ client.hostname }}</div>
                    <div class="ip">{{ client.ip }}</div>
                </a>
            </div>
        {% endfor %}
    {% else %}
        <p class="empty">Aucun client connecté</p>
    {% endif %}
    <div class="back-btn">
        <!-- Nouveaux boutons -->
	<a href="{{ url_for('stats') }}" >
	    <button>Statistiques</button>
	</a>
	<a href=" {{ url_for('history') }} ">
           
            <button>Historique</button>
        </a>
        
        
    <a href="{{ url_for('login') }}">
        <button>Exit</button>
    </a>
</div>
</div>
</body>
</html>
